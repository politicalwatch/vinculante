services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - 5432:5432
    env_file:
      - .env
    volumes:
      - vinculante-postgres:/var/lib/postgresql/data

  redis:
    image: redis:8.2
    ports:
      - 6379:6379

  engine:
    build: ./engine
    container_name: vinculante-engine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./engine:/code
      - /code/.venv
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "vinculante.main:create_app",
        "--factory",
        "--reload",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    ports:
      - 8000:8000

volumes:
  vinculante-postgres: