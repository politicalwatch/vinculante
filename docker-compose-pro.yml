services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - vinculante-postgres:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:8.2
    ports:
      - 6379:6379

  engine:
    build: ./engine
    container_name: vinculante-engine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./engine:/code
      - /code/.venv
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "engine.app:app",
        "--proxy-headers",
        "--host",
        "0.0.0.0",
        "--port",
        "8443",
      ]
    ports:
      - 8443:8443

  frontend:
    image: politicalwatch/vinculante:latest
    container_name: vinculante-frontend
    restart: unless-stopped
    env_file:
      - .env.frontend
    ports:
      - 80:80
    volumes:
      - ./nginx-default.conf:/etc/nginx/conf.d/default.conf

volumes:
  vinculante-postgres: